services:
  api:
    build:
      context: ./api
    container_name: ai-ticket-api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_ticket_automation
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: ai-ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ticket_automation
    ports:
      - "5433:5432"
    volumes:
      - ai_ticket_postgres_data:/var/lib/postgresql/data

volumes:
  ai_ticket_postgres_data: