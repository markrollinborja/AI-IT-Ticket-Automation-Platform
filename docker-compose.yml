services:
  api:
    build:
      context: ./api
    container_name: ai-ticket-api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_ticket_automation
    # "condition: service_healthy" instead of a plain dependency: without
    # this, `depends_on: [db]` only waits for the db *container* to
    # start, not for Postgres inside it to actually accept connections -
    # a very common source of "connection refused" on `docker compose up`
    # the first time, especially on a fresh volume. Now the api container
    # won't even start until the healthcheck below reports healthy.
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: ai-ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ticket_automation
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ai_ticket_postgres_data:/var/lib/postgresql/data

volumes:
  ai_ticket_postgres_data:
