name: CI

# Run the test suite automatically on every push and every pull request
# targeting main. This is what turns "I ran pytest on my machine" into
# "every change is verified the same way, every time" - the difference
# between a personal script and an actual engineering practice.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint doesn't need Postgres, so it's a separate job rather than a step
    # in "test" below - it runs in parallel, gives faster feedback on
    # style/import issues, and a lint failure doesn't wait on spinning up
    # a database service it never uses.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt

      - name: Run Ruff lint check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    # Scans pinned dependency versions against known vulnerability
    # databases (OSV, PyPI advisories). This is different from Dependabot:
    # Dependabot tells you when a *newer* version exists; pip-audit tells
    # you when your *current, already-pinned* version has a known CVE -
    # both matter, and they run independently of each other.
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Audit dependencies for known vulnerabilities
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: api/requirements.txt api/requirements-dev.txt

  test:
    runs-on: ubuntu-latest

    # A real Postgres instance, spun up just for this CI run and thrown
    # away afterward. This matches the "test against real Postgres, not
    # SQLite" decision from tests/conftest.py - the same fixtures that
    # work on a developer's machine work here unchanged.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # tests/conftest.py only sets DATABASE_URL if it isn't already set
    # (os.environ.setdefault), so this overrides the local-dev default
    # (port 5433) with the port this job's Postgres service is actually
    # running on (5432) - no code changes needed to run in both places.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ticket_automation_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing
