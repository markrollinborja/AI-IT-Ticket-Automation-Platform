version: 2
updates:
  # Python dependencies pinned in api/requirements.txt and
  # api/requirements-dev.txt. Dependabot opens a PR whenever a newer
  # version is available, so upgrades happen in small, reviewable
  # increments instead of piling up until something forces a big one.
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Without this, Dependabot opens one PR per outdated package (we saw
    # 13 at once on first run). Grouping combines them into a single PR
    # per ecosystem instead - one thing to review each week, not a dozen.
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Action versions used in .github/workflows/ci.yml
  # (actions/checkout, actions/setup-python, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Hook revisions pinned in .pre-commit-config.yaml
  # (ruff-pre-commit, gitleaks, pre-commit-hooks).
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
